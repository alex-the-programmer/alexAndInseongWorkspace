<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your Skincare Routine — soone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    :root {
      --cream: #F5F0E8;
      --cream-2: #EDE5D9;
      --cream-3: #FBF8F2;
      --paper: #FFFFFF;
      --ink: #1A1410;
      --ink-2: #4A3F37;
      --ink-3: #8C7E72;
      --ink-4: #B8AB9E;
      --line: rgba(26,20,16,0.08);
      --line-2: rgba(26,20,16,0.05);
      --orange: #F25422;
      --orange-soft: #FFE6DC;
      --rose: #E8B7A6;
      --rose-soft: #F8E3D8;
      --green: #2E7D5B;
      --green-soft: #DCEFE3;
      --amber-soft: #FBEBC8;

      --r-sm: 10px;
      --r-md: 14px;
      --r-lg: 20px;
      --r-xl: 28px;
    }

    html, body {
      margin: 0; padding: 0; background: var(--cream);
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: var(--ink); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    * { box-sizing: border-box; }
    button { font-family: inherit; }

    /* ===== Layout ===== */
    .page {
      min-height: 100vh;
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 32px 160px;
    }

    /* ===== Top nav (floating pill style from earlier) ===== */
    .topnav-wrap { display: flex; justify-content: center; padding: 24px 0 32px; }
    .topnav {
      background: var(--paper); border: 1px solid var(--line);
      border-radius: 999px; padding: 8px 8px 8px 22px;
      display: inline-flex; align-items: center; gap: 6px;
      box-shadow: 0 8px 24px -16px rgba(26,20,16,0.18), 0 1px 2px rgba(26,20,16,0.04);
    }
    .topnav .brand {
      font-family: 'Instrument Serif', serif; font-size: 24px; line-height: 1; color: var(--ink);
      padding-right: 14px; border-right: 1px solid var(--line); margin-right: 6px;
    }
    .topnav .link {
      padding: 9px 16px; border-radius: 999px; font-size: 14.5px; font-weight: 500;
      color: var(--ink-2); cursor: pointer; transition: background .15s, color .15s;
    }
    .topnav .link:hover { color: var(--ink); background: var(--cream); }
    .topnav .link.active { background: var(--ink); color: #FFFFFF; }
    .topnav .sep { width: 1px; height: 22px; background: var(--line); margin: 0 6px; }
    .topnav .iconbtn {
      width: 36px; height: 36px; border-radius: 999px; border: none; background: transparent;
      color: var(--ink); display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative; transition: background .15s;
    }
    .topnav .iconbtn:hover { background: var(--cream); }
    .topnav .iconbtn svg { width: 18px; height: 18px; }
    .topnav .dot { position: absolute; top: 6px; right: 7px; width: 7px; height: 7px; border-radius: 50%; background: var(--orange); border: 2px solid var(--paper); }
    .topnav .userpill {
      display: inline-flex; align-items: center; gap: 8px; padding: 4px 14px 4px 4px;
      border-radius: 999px; background: var(--cream); margin-left: 4px;
    }
    .topnav .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--rose-soft) 0%, var(--rose) 100%);
      color: var(--ink); font-weight: 600; font-size: 11px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .topnav .userpill .name { font-size: 13.5px; font-weight: 500; color: var(--ink); }

    /* ===== Buttons ===== */
    .btn {
      display: inline-flex; align-items: center; gap: 8px; justify-content: center;
      padding: 12px 20px; border-radius: 999px; font-size: 14.5px; font-weight: 500;
      cursor: pointer; border: 1px solid transparent; transition: background .15s, border-color .15s, transform .05s;
      white-space: nowrap;
    }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: var(--orange); color: #FFF; box-shadow: 0 6px 20px -8px rgba(242,84,34,0.55); }
    .btn-primary:hover { background: #DC4A1B; }
    .btn-ghost { background: transparent; color: var(--ink); border-color: var(--line); }
    .btn-ghost:hover { background: var(--paper); }
    .btn-paper { background: var(--paper); color: var(--ink); border-color: var(--line); }
    .btn-paper:hover { background: var(--cream-3); }
    .btn-dark { background: var(--ink); color: #FFF; }
    .btn-dark:hover { background: #2D241D; }
    .btn-sm { padding: 8px 14px; font-size: 13px; }
    .btn-icon { width: 36px; height: 36px; padding: 0; }

    /* ===== Common ===== */
    .card { background: var(--paper); border-radius: var(--r-lg); border: 1px solid var(--line-2); }
    .muted { color: var(--ink-3); }
    .eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink-3);
    }
    .serif { font-family: 'Instrument Serif', serif; font-weight: 400; }

    /* ===== Hero ===== */
    .hero {
      background: var(--paper); border-radius: var(--r-xl);
      padding: 40px 48px; display: flex; align-items: center; gap: 32px;
      border: 1px solid var(--line-2);
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; right: -120px; top: -120px; width: 380px; height: 380px;
      border-radius: 50%; background: radial-gradient(circle at 30% 30%, var(--rose-soft) 0%, rgba(248,227,216,0) 70%);
      pointer-events: none;
    }
    .hero .h-text { flex: 1; min-width: 0; position: relative; z-index: 1; }
    .hero h1 {
      font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 42px; line-height: 1.05;
      letter-spacing: -0.015em; margin: 0 0 10px;
    }
    .hero h1 i { color: var(--orange); font-style: italic; }
    .hero .h-sub { color: var(--ink-2); font-size: 15.5px; max-width: 560px; line-height: 1.5; }
    .hero .h-cta { display: flex; gap: 10px; align-items: center; position: relative; z-index: 1; }

    /* ===== Segmented (Morning / Evening) ===== */
    .seg {
      display: inline-flex; background: var(--paper); border: 1px solid var(--line);
      padding: 4px; border-radius: 999px; gap: 2px;
    }
    .seg button {
      padding: 8px 18px; border-radius: 999px; font-size: 14px; font-weight: 500;
      border: none; background: transparent; color: var(--ink-2); cursor: pointer;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .seg button.on { background: var(--ink); color: #FFF; }
    .seg svg { width: 14px; height: 14px; }

    /* ===== Routine list ===== */
    .section-head {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin: 36px 0 16px;
    }
    .section-head h2 {
      font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 32px;
      letter-spacing: -0.01em; margin: 0; white-space: nowrap;
    }
    .section-head > div:first-child { min-width: 0; }
    .section-head .meta { display: flex; align-items: center; gap: 18px; flex: 0 0 auto; }

    .stack { display: flex; flex-direction: column; gap: 10px; }

    /* ===== Step card ===== */
    .step {
      background: var(--paper); border: 1px solid var(--line-2); border-radius: var(--r-lg);
      padding: 16px; display: flex; align-items: center; gap: 16px;
      transition: border-color .15s, transform .05s;
    }
    .step:hover { border-color: var(--line); }
    .step .num {
      width: 36px; height: 36px; border-radius: 50%; background: var(--cream);
      color: var(--ink); font-size: 13px; font-weight: 600;
      display: inline-flex; align-items: center; justify-content: center;
      flex: 0 0 auto;
    }
    .step .thumb {
      width: 64px; height: 64px; border-radius: var(--r-md); overflow: hidden;
      background: linear-gradient(135deg, var(--cream-2) 0%, var(--cream-3) 100%);
      flex: 0 0 auto; display: flex; align-items: center; justify-content: center;
      color: var(--ink-3);
      position: relative;
    }
    .step .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .step .body { flex: 1; min-width: 0; }
    .step .cat { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 4px; }
    .step .name { font-size: 16px; font-weight: 500; color: var(--ink); line-height: 1.25; text-wrap: balance; }
    .step .name .brand { color: var(--ink-3); font-weight: 400; }
    .step .actions { display: flex; gap: 6px; align-items: center; flex: 0 0 auto; }
    .step .iconbtn-sm {
      width: 32px; height: 32px; border-radius: 999px; border: 1px solid transparent; background: transparent;
      color: var(--ink-3); display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .step .iconbtn-sm:hover { background: var(--cream); color: var(--ink); }
    .step .iconbtn-sm svg { width: 16px; height: 16px; }
    .step .badge-mini {
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 4px 8px; border-radius: 6px;
    }
    .step .badge-swap { background: var(--amber-soft); color: #7A5A00; }
    .step .badge-new { background: var(--green-soft); color: #1E5C40; }

    /* ===== Add-step row ===== */
    .add-step {
      border: 1.5px dashed rgba(26,20,16,0.18); border-radius: var(--r-lg);
      padding: 16px; display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: border-color .15s, background .15s;
      color: var(--ink-3);
    }
    .add-step:hover { border-color: var(--ink-3); background: rgba(255,255,255,0.4); color: var(--ink); }
    .add-step .plus {
      width: 36px; height: 36px; border-radius: 50%; background: var(--cream);
      display: inline-flex; align-items: center; justify-content: center; color: var(--ink);
    }

    /* ===== Recommendation banner ===== */
    .rec-banner {
      margin-top: 28px;
      background: linear-gradient(135deg, #FFF6F0 0%, #FFE6DC 100%);
      border: 1px solid #FAD1BD;
      border-radius: var(--r-xl);
      padding: 28px 32px;
      display: flex; align-items: center; gap: 24px;
      position: relative; overflow: hidden;
    }
    .rec-banner::before {
      content: ''; position: absolute; right: -60px; bottom: -60px; width: 240px; height: 240px;
      border-radius: 50%; background: radial-gradient(circle, rgba(242,84,34,0.10) 0%, rgba(242,84,34,0) 70%);
    }
    .rec-banner .rec-icon {
      width: 56px; height: 56px; border-radius: 50%; background: var(--orange);
      color: #FFF; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto;
    }
    .rec-banner .rec-icon svg { width: 24px; height: 24px; }
    .rec-banner h3 { margin: 0 0 4px; font-size: 19px; font-weight: 600; letter-spacing: -0.01em; }
    .rec-banner p { margin: 0; color: var(--ink-2); font-size: 14.5px; }
    .rec-banner .rec-cta { margin-left: auto; display: flex; gap: 10px; align-items: center; position: relative; z-index: 1; }

    /* ===== Empty state ===== */
    .empty {
      background: var(--paper); border-radius: var(--r-xl); border: 1px solid var(--line-2);
      padding: 64px 48px; text-align: center; max-width: 720px; margin: 24px auto 0;
      position: relative; overflow: hidden;
    }
    .empty::before {
      content: ''; position: absolute; left: 50%; top: -160px; width: 460px; height: 460px;
      transform: translateX(-50%); border-radius: 50%;
      background: radial-gradient(circle, var(--rose-soft) 0%, rgba(248,227,216,0) 70%);
    }
    .empty .e-icons {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 22px; position: relative; z-index: 1;
    }
    .empty .e-icons .ic {
      width: 52px; height: 52px; border-radius: 50%; background: var(--paper);
      border: 1px solid var(--line); display: inline-flex; align-items: center; justify-content: center;
      color: var(--ink); box-shadow: 0 4px 14px -6px rgba(26,20,16,0.12);
    }
    .empty .e-icons .ic svg { width: 22px; height: 22px; }
    .empty h2 {
      font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 44px; line-height: 1.05;
      letter-spacing: -0.015em; margin: 0 0 12px; position: relative; z-index: 1;
    }
    .empty h2 i { color: var(--orange); font-style: italic; }
    .empty p { color: var(--ink-2); font-size: 16px; max-width: 460px; margin: 0 auto 28px; line-height: 1.5; position: relative; z-index: 1; }
    .empty .e-cta { display: flex; gap: 12px; justify-content: center; position: relative; z-index: 1; }

    /* ===== Modal (sheet) ===== */
    .scrim {
      position: fixed; inset: 0; background: rgba(26,20,16,0.55); z-index: 100;
      display: flex; align-items: center; justify-content: center; padding: 32px;
      animation: fadeIn .18s ease both;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sheet {
      background: var(--paper); border-radius: var(--r-xl);
      width: 100%; max-width: 720px; max-height: calc(100vh - 64px);
      display: flex; flex-direction: column; overflow: hidden;
      animation: rise .24s cubic-bezier(.2,.7,.3,1) both;
      box-shadow: 0 30px 80px -20px rgba(26,20,16,0.4);
    }
    @keyframes rise { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .sheet-head {
      padding: 20px 28px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--line-2);
    }
    .sheet-head > div:first-child { flex: 0 0 auto; min-width: 0; }
    .sheet-head .pbar {
      flex: 1 1 auto; min-width: 60px; height: 4px; background: var(--cream); border-radius: 2px; overflow: hidden;
    }
    .sheet-head .pbar > span {
      display: block; height: 100%; background: var(--ink); border-radius: 2px;
      transition: width .3s cubic-bezier(.2,.7,.3,1);
    }
    .sheet-head .step-count { font-family: 'Geist Mono', monospace; font-size: 12px; color: var(--ink-3); white-space: nowrap; flex: 0 0 auto; }
    .sheet-body {
      flex: 1; overflow: auto; padding: 36px 40px 12px;
    }
    .sheet-foot {
      padding: 16px 28px; border-top: 1px solid var(--line-2); display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .iconbtn-close {
      width: 34px; height: 34px; border-radius: 999px; border: 1px solid var(--line); background: var(--paper);
      color: var(--ink-2); cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    }
    .iconbtn-close:hover { background: var(--cream); }

    /* ===== Wizard content ===== */
    .q-eyebrow { color: var(--ink-3); font-size: 13px; margin-bottom: 12px; }
    .q-title {
      font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 36px; line-height: 1.1;
      letter-spacing: -0.015em; margin: 0 0 14px;
    }
    .q-title i { color: var(--orange); font-style: italic; }
    .q-help { color: var(--ink-3); font-size: 14.5px; margin: 0 0 28px; line-height: 1.5; }

    .opt-grid { display: grid; gap: 10px; }
    .opt {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 18px; border: 1.5px solid var(--line); border-radius: var(--r-md);
      background: var(--paper); cursor: pointer; transition: border-color .15s, background .15s;
      width: 100%; text-align: left; font: inherit; color: var(--ink);
    }
    .opt:hover { border-color: var(--ink-4); }
    .opt.on { border-color: var(--ink); background: var(--cream-3); }
    .opt .ic {
      width: 36px; height: 36px; border-radius: 50%; background: var(--cream);
      display: inline-flex; align-items: center; justify-content: center; color: var(--ink);
      flex: 0 0 auto;
    }
    .opt .opt-title { font-size: 15px; font-weight: 500; }
    .opt .opt-sub { font-size: 13px; color: var(--ink-3); margin-top: 2px; }
    .opt .check {
      margin-left: auto; width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid var(--line); display: inline-flex; align-items: center; justify-content: center;
      color: transparent;
    }
    .opt.on .check { background: var(--ink); border-color: var(--ink); color: #FFF; }

    /* Pills for multi-select / categories */
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 14px; border-radius: 999px; border: 1.5px solid var(--line);
      background: var(--paper); font-size: 13.5px; font-weight: 500; cursor: pointer;
      color: var(--ink-2); transition: border-color .15s, background .15s, color .15s;
      white-space: nowrap;
    }
    .chip:hover { border-color: var(--ink-4); color: var(--ink); }
    .chip.on { background: var(--ink); border-color: var(--ink); color: #FFF; }

    /* Text input */
    .field {
      width: 100%; padding: 14px 16px; border-radius: var(--r-md);
      border: 1.5px solid var(--line); background: var(--paper); font: inherit; color: var(--ink);
      font-size: 15px; outline: none; transition: border-color .15s;
    }
    .field:focus { border-color: var(--ink); }

    /* ===== Chat-style onboarding bubbles ===== */
    .chat { display: flex; flex-direction: column; gap: 14px; padding: 8px 0 16px; }
    .bubble-row { display: flex; gap: 10px; align-items: flex-end; }
    .bubble-row.me { justify-content: flex-end; }
    .bubble {
      max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.4;
    }
    .bubble.bot { background: var(--cream); color: var(--ink); border-bottom-left-radius: 6px; }
    .bubble.me { background: var(--ink); color: #FFF; border-bottom-right-radius: 6px; }
    .bubble.bot.serif { font-family: 'Instrument Serif', serif; font-size: 22px; line-height: 1.2; padding: 14px 18px; }
    .avatar-bot {
      width: 28px; height: 28px; border-radius: 50%; background: var(--orange); color: #FFF;
      display: inline-flex; align-items: center; justify-content: center; font-family: 'Instrument Serif', serif; font-size: 16px;
      flex: 0 0 auto;
    }

    /* ===== Recommendations drawer ===== */
    .drawer-scrim {
      position: fixed; inset: 0; background: rgba(26,20,16,0.45); z-index: 90;
      animation: fadeIn .18s ease both;
    }
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; width: 560px; max-width: 100vw; z-index: 95;
      background: var(--cream-3); display: flex; flex-direction: column;
      box-shadow: -30px 0 60px -20px rgba(26,20,16,0.25);
      animation: slidein .28s cubic-bezier(.2,.7,.3,1) both;
    }
    @keyframes slidein { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .drawer-head {
      padding: 24px 28px 16px; border-bottom: 1px solid var(--line-2);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .drawer-head h3 {
      font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 28px; letter-spacing: -0.01em; margin: 0;
    }
    .drawer-head .sub { color: var(--ink-3); font-size: 13.5px; margin-top: 4px; }
    .drawer-body { flex: 1; overflow: auto; padding: 16px 24px 24px; }
    .drawer-foot { padding: 16px 24px; border-top: 1px solid var(--line-2); display: flex; gap: 10px; background: var(--paper); }

    /* Recommendation diff row */
    .diff {
      background: var(--paper); border: 1px solid var(--line-2); border-radius: var(--r-lg);
      padding: 14px; margin-bottom: 10px;
    }
    .diff .diff-head {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .diff .diff-head .cat { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); }
    .diff .badge {
      font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 4px 8px; border-radius: 6px;
    }
    .diff .badge-keep { background: var(--green-soft); color: #1E5C40; }
    .diff .badge-swap { background: var(--amber-soft); color: #7A5A00; }
    .diff .badge-new { background: var(--orange-soft); color: #A53614; }
    .diff .pair { display: flex; gap: 10px; align-items: stretch; }
    .diff .side { flex: 1; min-width: 0; padding: 12px; border-radius: var(--r-md); background: var(--cream-3); display: flex; gap: 10px; align-items: center; }
    .diff .side.now { background: var(--cream); }
    .diff .side .thumb { width: 44px; height: 44px; border-radius: 8px; background: var(--paper); flex: 0 0 auto; overflow: hidden; }
    .diff .side .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .diff .side .meta { min-width: 0; flex: 1; }
    .diff .side .label { font-size: 10.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); }
    .diff .side .nm { font-size: 13px; font-weight: 500; line-height: 1.25; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; }
    .diff .side .brand { color: var(--ink-3); font-weight: 400; }
    .diff .arrow {
      width: 28px; flex: 0 0 auto; display: inline-flex; align-items: center; justify-content: center; color: var(--ink-3);
    }
    .diff .diff-foot {
      display: flex; align-items: center; justify-content: space-between; margin-top: 12px; gap: 10px;
    }
    .diff .reason { color: var(--ink-2); font-size: 13px; line-height: 1.45; flex: 1; }
    .diff .applied {
      font-size: 12.5px; font-weight: 500; color: var(--green); display: inline-flex; align-items: center; gap: 6px;
    }

    /* ===== Demo switcher ===== */
    .demo {
      position: fixed; bottom: 16px; left: 16px; z-index: 200;
      background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md);
      padding: 8px; display: flex; gap: 4px; box-shadow: 0 6px 20px -8px rgba(26,20,16,0.2);
      font-size: 12px;
    }
    .demo .l {
      font-family: 'Geist Mono', monospace; color: var(--ink-3); font-size: 10.5px;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 8px; align-self: center;
    }
    .demo button {
      padding: 7px 10px; border-radius: 8px; border: none; background: transparent;
      font: inherit; color: var(--ink-2); cursor: pointer; font-weight: 500; white-space: nowrap;
    }
    .demo button:hover { background: var(--cream); color: var(--ink); }
    .demo button.on { background: var(--ink); color: #FFF; }

    /* Small product image fallback */
    .ph-bottle {
      background: linear-gradient(135deg, var(--rose-soft) 0%, var(--cream) 100%);
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      color: var(--ink-3); font-family: 'Instrument Serif', serif; font-size: 20px;
    }
    /* ===== Price tag ===== */
    .price {
      display: inline-flex; align-items: baseline; gap: 6px; font-variant-numeric: tabular-nums;
    }
    .price .now { font-size: 14px; font-weight: 600; color: var(--ink); }
    .price .was { font-size: 12px; color: var(--ink-3); text-decoration: line-through; }
    .price-lg .now { font-size: 18px; }
    .price-xl .now { font-size: 22px; letter-spacing: -0.01em; }
    .sale-pill {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      padding: 3px 7px; border-radius: 999px;
      background: var(--orange-soft); color: var(--orange);
    }
    .step .price { margin-left: 14px; flex: 0 0 auto; }
    .step .price-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; margin-left: 14px; flex: 0 0 auto; }
    .ship-pill {
      display: inline-flex; align-items: center; gap: 6px; padding: 4px 9px; border-radius: 999px;
      font-size: 11.5px; font-weight: 500; color: var(--green); background: var(--green-soft);
    }
